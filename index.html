<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>21天听力场景词汇</title>
  <style>
    :root {
      --primary: #3b6092;
      --primary-deep: #32271f;
      --secondary: #8f775d;
      --danger: #a2473d;
      --bg: #ded2bd;
      --card: #f4ecdf;
      --text: #32271f;
      --muted: #6f5a49;
      --line: rgba(117, 96, 67, 0.16);
      --chip: rgba(232, 224, 205, 0.78);
      --chip-border: rgba(117, 96, 67, 0.22);
      --mustard: #8e7431;
      --shadow: 0 18px 44px rgba(79, 53, 28, 0.14);
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --radius-pill: 999px;
      --radius-panel: 18px;
      --radius-card: 20px;
    }

    .v2-shell {
      --surface: #f4ecdf;
      --panel: #ece0cb;
      --shadow: 0 18px 44px rgba(79, 53, 28, 0.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0) 14%),
        repeating-linear-gradient(
          to bottom,
          rgba(117, 96, 67, 0.05) 0,
          rgba(117, 96, 67, 0.05) 1px,
          transparent 1px,
          transparent 20px
        ),
        linear-gradient(180deg, #ded2bd 0%, #d0c1a7 100%);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Helvetica Neue", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0) 14%),
        repeating-linear-gradient(
          to bottom,
          rgba(117, 96, 67, 0.05) 0,
          rgba(117, 96, 67, 0.05) 1px,
          transparent 1px,
          transparent 20px
        ),
        linear-gradient(180deg, #ded2bd 0%, #d0c1a7 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    button, input { font: inherit; }
    button {
      min-height: 44px;
      min-width: 44px;
      border: 1px solid rgba(74, 57, 39, 0.18);
      border-radius: 999px;
      cursor: pointer;
      background: rgba(244, 236, 223, 0.88);
      color: var(--text);
    }
    button:focus-visible, .search-box:focus-visible, .chip-btn:focus-visible, .word-btn:focus-visible {
      outline: none;
      border-color: rgba(59, 96, 146, 0.88);
      box-shadow: 0 0 0 3px rgba(59, 96, 146, 0.18);
    }

    header {
      position: relative;
      background: transparent;
      border-bottom: none;
      padding: var(--space-6) var(--space-6) var(--space-2);
      z-index: 2;
    }
    .head-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .title {
      position: relative;
      padding-top: 14px;
      font-family: Baskerville, "Times New Roman", serif;
      font-size: 34px;
      font-weight: 700;
      color: var(--primary-deep);
      letter-spacing: -0.03em;
    }
    .title::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 48px;
      height: 10px;
      background: var(--primary);
      box-shadow: 12px 0 0 rgba(59, 96, 146, 0.18);
    }
    .tabs {
      display: inline-flex;
      gap: var(--space-2);
      background: transparent;
      padding: 0;
      border-radius: var(--radius-pill);
    }
    .tab-btn,
    .review-tab {
      font-weight: 800;
      padding: 0 16px;
      min-width: 44px;
      min-height: 42px;
      border-radius: var(--radius-pill);
      background: rgba(244, 236, 223, 0.88);
      color: var(--muted);
      box-shadow: 0 4px 12px rgba(67, 49, 30, 0.05);
      border: 1px solid rgba(74, 57, 39, 0.18);
    }
    .tab-btn.active,
    .review-tab.active,
    .review-tab-btn.active {
      background: var(--primary-deep);
      color: var(--card);
      border-color: var(--primary-deep);
    }
    .search-box {
      width: 100%;
      margin-top: var(--space-3);
      border: 1px solid rgba(74, 57, 39, 0.2);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(244, 236, 223, 0.82);
      font-size: 15px;
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
    }

    main { flex: 1; min-height: 0; position: relative; overflow: hidden; }

    #card-view { height: 100%; display: flex; align-items: center; justify-content: center; padding: 6px 10px 14px; }
    .card-wrap { width: min(92vw, 450px); height: min(78vh, 668px); max-height: 668px; perspective: 1500px; }
    .card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.55s ease, opacity 0.25s ease;
      will-change: transform;
    }
    .card.flipped { transform: rotateY(180deg); }
    .card.slide-left { animation: slideLeft 180ms ease both; }
    .card.slide-right { animation: slideRight 180ms ease both; }
    @keyframes slideLeft { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-32px); opacity: 0.3; } }
    @keyframes slideRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(32px); opacity: 0.3; } }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background: var(--card);
      border: 1px solid rgba(117, 96, 67, 0.24);
      box-shadow: var(--shadow);
      backface-visibility: hidden;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .v2-shell .face {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.38), rgba(255,255,255,0) 18%),
        linear-gradient(180deg, #f7f0e5 0%, var(--surface) 100%);
    }
    .face::before {
      content: "";
      position: absolute;
      top: 16px;
      left: 18px;
      width: 42px;
      height: 8px;
      border-radius: 2px 2px 0 0;
      background: var(--primary);
      opacity: 0.94;
    }
    .back::before { background: var(--danger); }
    .face.empty {
      justify-content: center;
      align-items: center;
      padding: 28px 22px;
      text-align: center;
    }
    .front { padding: 38px 24px 20px; justify-content: center; }
    .back { transform: rotateY(180deg); padding: 38px 26px 28px; }
    .empty-title {
      color: var(--primary-deep);
      font-size: 28px;
      font-weight: 900;
      line-height: 1.2;
    }
    .empty-text {
      margin-top: 12px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      max-width: 26ch;
    }

    .category {
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-align: left;
      text-transform: uppercase;
      font-family: Menlo, Monaco, monospace;
    }
    .front-top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }
    .word-btn {
      margin-top: 12px;
      border: none;
      background: transparent;
      color: var(--primary-deep);
      border-radius: 0;
      padding: 0;
      font-family: Baskerville, "Times New Roman", serif;
      font-size: clamp(38px, 7vw, 54px);
      line-height: 0.94;
      font-weight: 700;
      text-align: left;
      width: 100%;
      word-break: break-word;
      box-shadow: none;
      letter-spacing: -0.04em;
    }
    .syllable-sep {
      display: inline-block;
      margin: 0 0.18em;
      font-size: 0.48em;
      line-height: 1;
      opacity: 0.8;
      transform: translateY(-0.08em);
    }
    .ipa-row { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-start; align-items: center; }
    .pill {
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 0;
      padding: 0;
      font-weight: 800;
      font-size: 13px;
      min-height: auto;
      min-width: auto;
      box-shadow: none;
      font-family: Menlo, Monaco, monospace;
    }
    .helper-row {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-start;
    }
    .status-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .status-btn {
      min-width: auto;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(117, 96, 67, 0.2);
      background: rgba(237, 228, 211, 0.72);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      box-shadow: none;
    }
    .status-btn.active {
      background: var(--primary-deep);
      color: var(--card);
      border-color: var(--primary-deep);
    }
    .card-familiar-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 2;
      min-width: auto;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(117, 96, 67, 0.2);
      background: rgba(237, 228, 211, 0.72);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      box-shadow: none;
    }
    .card-familiar-btn.active {
      background: var(--primary-deep);
      color: var(--card);
      border-color: var(--primary-deep);
    }
    .ghost-pill {
      border: 1px solid rgba(117, 96, 67, 0.2);
      background: rgba(237, 228, 211, 0.72);
      color: var(--ink, var(--text));
      border-radius: 999px;
      padding: 7px 12px;
    }
    .v2-word-tools {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .section-title {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid rgba(117, 96, 67, 0.16);
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      text-align: left;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .chips { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; justify-content: flex-start; }
    .chips-left { justify-content: flex-start; }
    .v2-card-wrap {
      width: min(92vw, 500px);
      max-width: 520px;
      height: min(80vh, 704px);
      max-height: 704px;
      margin: 0 auto;
    }
    .v2-card-face.back .section-title {
      margin-top: 12px;
    }
    .chip-btn {
      border: 1px solid var(--chip-border);
      background: var(--chip);
      color: var(--primary-deep);
      border-radius: 999px;
      padding: 8px 12px;
      min-height: 32px;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.1;
      font-family: Menlo, Monaco, monospace;
    }

    .back-scroll { overflow: auto; min-height: 0; padding-right: 4px; }
    .back-scroll.density-compact .sheet-meaning {
      font-size: clamp(24px, 3.5vw, 30px);
      line-height: 1.18;
    }
    .back-scroll.density-dense .sheet-meaning {
      font-size: clamp(22px, 3vw, 28px);
      line-height: 1.16;
    }
    .back-scroll.density-compact .txt,
    .back-scroll.density-compact .txt.example {
      font-size: 12px;
      line-height: 1.56;
    }
    .back-scroll.density-dense .txt,
    .back-scroll.density-dense .txt.example {
      font-size: 11px;
      line-height: 1.5;
    }
    .item { margin: 10px 0; }
    .label {
      display: inline-block;
      padding: 0;
      border-radius: 0;
      font-size: 11px;
      font-weight: 900;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .l1, .l2, .l3, .l4, .l5 { background: transparent; }
    .txt { margin-top: 6px; color: #4b3f35; font-size: 13px; line-height: 1.65; word-break: break-word; }
    .txt.example { font-style: italic; border-left: 3px solid rgba(166, 146, 119, 0.45); padding-left: 10px; color: #5d4d3d; font-size: 12px; line-height: 1.62; }
    .phrase-lines, .example-lines { display: flex; flex-direction: column; gap: 3px; }
    .phrase-line { line-height: 1.48; }
    .example-en, .example-cn, .example-note { display: block; }
    .example-en { font-style: italic; }
    .example-cn, .example-note { font-style: normal; }
    .example-note { color: #334155; }

    #list-view { display: none; height: 100%; flex-direction: column; min-height: 0; }
    .scope-panel,
    .list-scope-panel,
    .review-scope-panel {
      margin: 10px 12px 0;
      border: 1px solid rgba(117, 96, 67, 0.18);
      border-radius: var(--radius-panel);
      background: rgba(244, 236, 223, 0.82);
      padding: var(--space-3) 14px;
      box-shadow: 0 10px 24px rgba(79, 53, 28, 0.06);
      flex: 0 0 auto;
    }
    .scope-panel summary,
    .list-scope-panel summary,
    .review-scope-panel summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      color: var(--primary-deep);
      font-weight: 900;
      cursor: pointer;
      list-style: none;
    }
    .scope-panel summary::-webkit-details-marker,
    .list-scope-panel summary::-webkit-details-marker,
    .review-scope-panel summary::-webkit-details-marker { display: none; }
    .scope-summary,
    .list-scope-summary,
    .review-scope-summary {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.4;
      text-align: right;
    }
    .scope-body,
    .list-scope-body,
    .review-scope-body {
      margin-top: 10px;
      max-height: min(42vh, 320px);
      overflow: auto;
      padding-right: 2px;
      -webkit-overflow-scrolling: touch;
    }
    .list-filter-section + .list-filter-section {
      margin-top: 12px;
    }
    .list-filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .list-scroll { flex: 1; overflow: auto; padding: var(--space-2) var(--space-3); }
    .v2-list-scroll { padding: var(--space-3) 14px; }
    .list-row {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(117, 96, 67, 0.18);
      border-radius: 16px;
      background: rgba(244, 236, 223, 0.88);
      padding: 22px 16px 14px;
      margin-bottom: 10px;
      display: block;
      position: relative;
      box-shadow: 0 10px 24px rgba(79, 53, 28, 0.08);
    }
    .list-row::before {
      content: none;
    }
    .list-row:active { background: rgba(236, 227, 210, 0.96); }
    .v2-list-row { border-radius: 16px; padding: 22px 16px 14px; }
    .v2-list-meta { display: flex; flex-direction: column; gap: 5px; }
    .v2-list-row .list-word { font-size: 30px; }
    .v2-list-row .list-mean { font-size: 18px; line-height: 1.38; }
    .list-word {
      font-family: Baskerville, "Times New Roman", serif;
      font-size: 30px;
      color: var(--primary-deep);
      font-weight: 700;
      line-height: 0.96;
      letter-spacing: -0.04em;
    }
    .list-mean { margin-top: 3px; font-size: 18px; line-height: 1.38; color: var(--primary); font-weight: 700; }
    .list-syn { margin-top: 8px; color: var(--muted); font-size: 11px; font-weight: 700; line-height: 1.6; font-family: Menlo, Monaco, monospace; }
    .hearing-day-app .section-title,
    .hearing-day-app #f-repl {
      display: none;
    }
    .hearing-day-app .front {
      justify-content: center;
      gap: 4px;
    }
    .hearing-day-app .front .category,
    .hearing-day-app .front .word-btn,
    .hearing-day-app .front .ipa-row,
    .hearing-day-app .front .helper-row {
      margin-left: auto;
      margin-right: auto;
      width: 100%;
      max-width: 320px;
    }
    .hearing-day-app .front .word-btn,
    .hearing-day-app .front .category,
    .hearing-day-app .front .ipa-row,
    .hearing-day-app .front .helper-row {
      text-align: left;
    }
    .hearing-day-app .front .front-top-row {
      margin: 0;
      width: 100%;
      max-width: none;
      text-align: initial;
    }
    .hearing-day-app .list-scroll {
      overflow-x: hidden;
    }
    .hearing-list-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: stretch;
      gap: 10px;
      width: 100%;
      text-align: left;
    }
    .hearing-list-section {
      margin: 6px 0 8px;
      padding: 2px 2px 0;
    }
    .hearing-list-section-day {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: Menlo, Monaco, monospace;
    }
    .hearing-list-section-title {
      margin-top: 2px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }
    .hearing-list-main {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      width: 100%;
      border: none;
      background: transparent;
      padding: 0;
      min-width: 0;
      min-height: 0;
      box-shadow: none;
      text-align: left;
    }
    .hearing-list-arrow {
      align-self: center;
      justify-self: end;
      width: 38px;
      height: 38px;
      min-width: 38px;
      min-height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(117, 96, 67, 0.2);
      background: rgba(237, 228, 211, 0.72);
      color: var(--primary-deep);
      font-size: 18px;
      font-weight: 900;
      box-shadow: none;
    }
    .hearing-list-row .list-word {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hearing-list-row .list-mean {
      margin: 0;
      font-size: 15px;
      line-height: 1.45;
      color: var(--primary);
      font-weight: 700;
    }
    .hearing-list-empty {
      display: block;
    }

    .pager {
      border-top: 1px solid rgba(117, 96, 67, 0.12);
      background: rgba(244, 236, 223, 0.7);
      padding: 8px 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    footer {
      height: 72px;
      border-top: 1px solid var(--line);
      background: rgba(244, 236, 223, 0.72);
      align-items: center;
      padding: 0 20px;
      gap: 8px;
    }
    footer.footer-card {
      display: grid;
      grid-template-columns: 52px 1fr 52px;
    }
    footer.footer-static {
      display: flex;
      justify-content: center;
    }
    .nav-btn { font-size: 26px; font-weight: 900; color: var(--primary-deep); border-color: rgba(117, 96, 67, 0.18); background: rgba(244,236,223,0.88); }
    .nav-btn:first-child { justify-self: start; }
    .nav-btn:last-child { justify-self: end; }
    .prog { text-align: center; justify-self: center; width: 100%; }
    .prog-main { font-size: 28px; font-weight: 800; color: var(--primary-deep); font-family: Menlo, Monaco, monospace; letter-spacing: 0.02em; }
    .prog-sub { font-size: 11px; color: var(--muted); font-weight: 800; }
    .progress-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }
    .progress-btn {
      min-width: auto;
      min-height: 34px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 800;
      box-shadow: none;
    }

    #review-view {
      display: none;
      height: 100%;
      flex-direction: column;
      padding: 12px 12px 16px;
      gap: 12px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .v2-review-shell {
      padding: 8px 10px 14px;
      gap: 12px;
    }
    .review-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
    }
    .v2-review-toolbar {
      padding: 2px 2px 0;
    }
    .review-filter-section + .review-filter-section {
      margin-top: var(--space-3);
    }
    .review-filter-section-label {
      color: var(--primary-deep);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .review-filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .review-status-grid,
    .list-status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .review-filter-item {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(117, 96, 67, 0.18);
      border-radius: 14px;
      background: rgba(244, 236, 223, 0.72);
      padding: 10px 12px;
      color: var(--primary-deep);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }
    .review-filter-item input {
      width: 18px;
      height: 18px;
      margin: 0;
      flex: 0 0 auto;
      accent-color: var(--primary);
    }
    .review-filter-item.review-filter-all {
      grid-column: 1 / -1;
      background: rgba(236, 228, 213, 0.86);
    }
    .review-filter-item .review-filter-copy {
      display: flex;

    function splitSyllables(word) {
      const w = String(word || '').trim();
      if (!w) return '';
      if (w.length <= 3 || /[\s-]/.test(w)) return w;
      const lower = w.toLowerCase();
      const groups = [...lower.matchAll(/[aeiouy]+/g)].map(m => ({ start: m.index, end: m.index + m[0].length }));
      if (groups.length < 2) return w;
      const cuts = [];
      for (let i = 0; i < groups.length - 1; i++) {
        const left = groups[i];
        const right = groups[i + 1];
        const clusterStart = left.end;
        const clusterEnd = right.start;
        const cluster = lower.slice(clusterStart, clusterEnd);
        if (!cluster) {
          cuts.push(right.start);
          continue;
        }
        let cut = clusterStart;
        if (cluster.length === 1) {
          cut = clusterStart;
        } else if (cluster.length === 2) {
          const second = cluster[1];
          cut = (second === 'l' || second === 'r') ? clusterStart : (clusterStart + 1);
        } else {
          cut = clusterStart + 1;
        }
        if (cut > 0 && cut < w.length) cuts.push(cut);
      }
      const uniq = [...new Set(cuts)].filter(x => x > 0 && x < w.length);
      if (!uniq.length) return w;
      let out = '';
      let prev = 0;
      for (const cut of uniq.slice(0, 4)) {
        out += w.slice(prev, cut) + '·';
        prev = cut;
      }
      out += w.slice(prev);
      return out.replace(/·+/g, '·').replace(/^·|·$/g, '');
    }

    function buildPronHint(word, ipa) {

      return { syllables, text: `音节 ${syllables} · ${stress}` };
    }

      const lower = value.toLowerCase();
      if (pairs[lower]) {
        return pairs[lower][accent] || pairs[lower]['en-US'] || value;

      const parts = value.split('/').map((part) => part.trim()).filter(Boolean);
      if (parts.length === 2 && parts.every((part) => /^[A-Za-z -]+$/.test(part))) {
        return accent === 'en-US' ? parts[1] : parts[0];

      return value;
    }

    function normalizeSpeechSpelling(text) {
      const normalized = chooseAccentVariant(String(text || ''));
      return normalized.replace(/[A-Za-z][A-Za-z'-]*/g, (token) => {
        const mapped = normalizeSpeechToken(token);
        if (!mapped || mapped === token) return token;
        const lower = token.toLowerCase();
        if (token === lower) return mapped;
        if (token === token.toUpperCase()) return mapped.toUpperCase();
        return mapped.charAt(0).toUpperCase() + mapped.slice(1);
      });
    }

    function buildNaturalSpeakText(text) {
      return normalizeSpeechSpelling(String(text || ''))
        .replace(/[–—]/g, '-')
        .replace(/&/g, ' and ')
        .replace(/\//g, ' ')
        .replace(/[()[\]{}]/g, ' ')
        .replace(/\s+/g, ' ')
        .replace(/\s*-\s*/g, '-')
        .trim();

    function normalizeCoreFields(it) {
      const out = {
        meaning: String(it.meaning_cn || '').trim(),

        phrases: Array.isArray(it.phrases) ? it.phrases : [],

      };
      const logicWord = /\*/.test(String(it.word || '')) || /雅思核心|并列关系|转折|因果/.test(out.meaning + out.root);
      if (logicWord) {
        out.meaning = out.meaning
          .replace(/[（(][^)）]*雅思[^)）]*[)）]/g, '')
          .replace(/[（(][^)）]*(并列|转折|因果|逻辑)[^)）]*[)）]/g, '')

        out.root = '（逻辑考点词，词根项不适用）';
      }
      if (!out.root) out.root = '（词根待校验）';
      if (!out.example) out.example = '（例句待校验）';

    function isUnreliableRootMemory(rootText) {
      const text = String(rootText || '').trim();
      if (!text) return false;
      // 不靠谱的“词根/词形”联想会误导学习，直接隐藏，不进入展示层。
      const riskyPatterns = [
        /联想记忆：把/u,
        /整体记忆/u,
        /先记核心概念/u,
        /词形记忆：看到/u,
        /做题时留意它修饰的对象/u,
        /阅读时先抓核心概念/u,
        /阅读里按语境再判断/u,
        /直接对应/u,
      ];
      return riskyPatterns.some((pattern) => pattern.test(text));
    }

    function shouldDisplayRootMemory(rootText) {
      const text = String(rootText || '').trim();
      if (!text) return false;
      if (text.includes('词根项不适用')) return false;
      if (isPendingText(text)) return false;
      if (isUnreliableRootMemory(text)) return false;
      return true;
    }

    function getCopyDensityClass(parts, extraWeight = 0) {
      const text = (Array.isArray(parts) ? parts : [parts])
        .map((part) => String(part || '').trim())
        .filter(Boolean)
        .join(' ');
      if (!text) return '';
      const punctuationWeight = (text.match(/[；;：:，,、/]/g) || []).length * 2;
      const lineWeight = (text.match(/\n/g) || []).length * 6;
      const score = text.length + punctuationWeight + lineWeight + extraWeight;
      if (score >= 170) return 'density-dense';
      if (score >= 96) return 'density-compact';
      return '';
    }

    function getHeadlineFitClass(text) {
      const clean = String(text || '').replace(/\s+/g, '').trim();
      if (!clean) return '';
      const segments = clean.split(/[；;：:，,、()（）/\s]/).filter(Boolean);
      const longestSegment = segments.reduce((max, segment) => Math.max(max, segment.length), 0);
      const punctuationWeight = (clean.match(/[；;：:，,、/]/g) || []).length * 3;
      const score = clean.length + longestSegment * 4 + punctuationWeight;
      if (score >= 108) return 'fit-ultra';
      if (score >= 74) return 'fit-dense';
      if (score >= 42) return 'fit-compact';
      return '';
    }

    function isPendingText(value) {
      return /待(补充|校验)/.test(String(value || ''));
    }

    function formatPhraseHTML(phrases) {
      const rawList = Array.isArray(phrases) ? phrases : [phrases];
      const lines = [];
      for (const raw of rawList) {
        const text = String(raw || '').trim();
        if (!text) continue;
        const parts = text.split(/[；;]/).map(s => s.trim()).filter(Boolean);
        if (!parts.length) continue;
        for (const part of parts) {
          if (!/[A-Za-z]/.test(part) && lines.length) {
            lines[lines.length - 1] = `${lines[lines.length - 1]} ${part}`.trim();
          } else {
            lines.push(part);
          }
        }
      }
      if (!lines.length) {
        return sanitizeHTML('（本词未标注）');
      }
      return `<div class="phrase-lines">${lines.map(line => `<div class="phrase-line">${sanitizeHTML(line)}</div>`).join('')}</div>`;
    }

    function formatExampleHTML(text) {
      const src = String(text || '').trim();
      if (!src) return sanitizeHTML('（例句待校验）');
      if (isPendingText(src)) return sanitizeHTML(src);
      const blocks = src
        .split('//')
        .map(s => s.trim())
        .filter(Boolean)
        .map(block => {
          const normalized = block.replace(/\s+/g, ' ').trim();
          const firstCn = normalized.search(/[\u4e00-\u9fff]/);
          let en = normalized;
          let cn = '';
          if (firstCn > 0) {
            en = normalized.slice(0, firstCn).trim();
            cn = normalized.slice(firstCn).trim();
          }
          if (!cn && /。|；/.test(en) && /[A-Za-z]/.test(en) && /[\u4e00-\u9fff]/.test(en)) {
            const m = en.match(/^(.*?[.!?])\s*(.*)$/);
            if (m && /[\u4e00-\u9fff]/.test(m[2] || '')) {
              en = m[1].trim();
              cn = m[2].trim();
            }
          }
          const parts = [];
          if (en) parts.push(`<span class="example-en">${sanitizeHTML(en)}</span>`);
          if (cn) parts.push(`<span class="example-cn">${sanitizeHTML(cn)}</span>`);
          if (!parts.length) parts.push(`<span>${sanitizeHTML(normalized)}</span>`);
          return `<div>${parts.join('')}</div>`;
        });
      return `<div class="example-lines">${blocks.join('')}</div>`;
    }

    function parseSynonyms(raw) {
      if (!raw) return [];
      const cleaned = String(raw).replaceAll('...', ' ').replaceAll('…', ' ').replaceAll('*', ' ');
      const parts = cleaned.split(/[;,，；]+/g).map(s => s.trim()).filter(Boolean);
      const seen = new Set();
      const out = [];
      for (const p of parts) {
        const x = p.replace(/\s+/g, ' ').trim();
        if (!x) continue;
        if (!/[A-Za-z]/.test(x)) continue;
        const k = x.toLowerCase();
        if (seen.has(k)) continue;
        seen.add(k);
        out.push(x);
      }
      return out;
    }

    function buildReplacementMapByWord() {
      replacementByWord = new Map();
      replacementByCoreId = new Map();
      for (const r of replacementData) {
        replacementByWord.set(String(r.word || '').toLowerCase(), r);
        const anchorCoreId = String(r.anchor_core_id || '').trim();
        if (!anchorCoreId) continue;
        if (!replacementByCoreId.has(anchorCoreId)) {
          replacementByCoreId.set(anchorCoreId, []);
        }
        replacementByCoreId.get(anchorCoreId).push(r);
      }
      coreByWord = new Map();
      for (const c of coreData) {
        coreByWord.set(String(c.word || '').toLowerCase(), c);
      }
    }

    async function loadDataSources() {
      if (window.__IELTS_DATA__ && Array.isArray(window.__IELTS_DATA__.core) && Array.isArray(window.__IELTS_DATA__.replacement)) {
        return window.__IELTS_DATA__;
      }
      const [coreRes, replRes, reportRes] = await Promise.all([
        fetch('./core_words.json', { cache: 'no-store' }),
        fetch('./replacement_words.json', { cache: 'no-store' }),
        fetch('./validation_report.json', { cache: 'no-store' }),
      ]);
      return {
        core: await coreRes.json(),
        replacement: await replRes.json(),
        report: await reportRes.json(),
      };
    }

    async function init() {
      try {
        const payload = await loadDataSources();
        coreData = payload.core;
        replacementData = payload.replacement;
        const report = payload.report || {};

        buildReplacementMapByWord();
        curList = [...coreData];

        const hard = report.hard_check || {};
        const summary = `校验 core=${report.core_count} total=${report.total_words_by_count_rule} 对齐错误=${report.line_alignment_errors}`;
        document.getElementById('progress-sub').innerText = summary;
        if (!hard.core_equals_376 || !hard.count_rule_equals_538 || !hard.no_missing_fields || !hard.no_placeholders || !hard.line_alignment_zero) {
          document.getElementById('progress-sub').innerText = '数据校验未全绿，请先运行构建脚本修复';
        }

        bindEvents();
        initVoices();
        render({ autoplay: true });
        updateProgress();
        resetReviewDeck();
      } catch (err) {
        document.getElementById('f-word').innerText = '数据加载失败';
        document.getElementById('progress-sub').innerText = '请确认 data_bundle.js 或 JSON 文件存在且同目录';
        console.error(err);
      }
    }

      document.addEventListener('keydown', (e) => {
        if (e.target && /input|textarea|select/i.test(e.target.tagName || '')) return;
        if (viewMode === 'card' && e.key === 'ArrowRight') {
          e.preventDefault();
          navigate(1, 'left');
        }
        if (viewMode === 'card' && e.key === 'ArrowLeft') {
          e.preventDefault();
          navigate(-1, 'right');
        }
        if (viewMode === 'card' && (e.code === 'Space' || e.key === ' ')) {
          e.preventDefault();
          navigate(1, 'left');
        }
        if (viewMode === 'review' && e.key === 'ArrowRight') {
          e.preventDefault();
          navigateReview(1, 'left');
        }
        if (viewMode === 'review' && e.key === 'ArrowLeft') {
          e.preventDefault();
          navigateReview(-1, 'right');
        }
        if (viewMode === 'review' && (e.code === 'Space' || e.key === ' ')) {
          e.preventDefault();
          navigateReview(1, 'left');
        }
      }, { passive: false });

      document.addEventListener('wheel', (e) => {
        if (viewMode !== 'card' && viewMode !== 'review') return;
        if (Math.abs(e.deltaY) < 16) return;
        if (wheelLock) return;
        wheelLock = true;
        setTimeout(() => { wheelLock = false; }, 170);
        e.preventDefault();
        if (viewMode === 'card') {
          if (e.deltaY > 0) navigate(1, 'left');
          else navigate(-1, 'right');
          return;
        }
        if (e.deltaY > 0) navigateReview(1, 'left');
        else navigateReview(-1, 'right');
      }, { passive: false });

      document.addEventListener('touchstart', (e) => {
        if (viewMode !== 'card' && viewMode !== 'review') return;
        if (viewMode === 'review' && e.target.closest('#review-answer-input')) return;
        touchStartX = e.changedTouches[0].clientX;
      }, { passive: true });

      document.addEventListener('touchend', (e) => {
        if (viewMode !== 'card' && viewMode !== 'review') return;
        const endX = e.changedTouches[0].clientX;
        const delta = touchStartX - endX;
        if (viewMode === 'card') {
          if (delta > 46) navigate(1, 'left');
          if (delta < -46) navigate(-1, 'right');
          return;

        if (delta > 46) navigateReview(1, 'left');
        if (delta < -46) navigateReview(-1, 'right');

      document.getElementById('review-filter-all').addEventListener('change', (e) => {

      document.getElementById('review-filter-cat1').addEventListener('change', (e) => {

      document.getElementById('review-filter-replacement').addEventListener('change', (e) => {

    function initVoices() {
      const refresh = () => {
        voicePool = speechSynthesis.getVoices() || [];
      };
      refresh();
      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = refresh;
      }
    }

    function pickVoice() {
      if (!voicePool.length) return null;
      const langPrefix = accent === 'en-US' ? 'en-us' : 'en-gb';
      const preferredNames = accent === 'en-US'
        ? ['ava', 'allison', 'jenny', 'aria', 'samantha', 'emma', 'olivia', 'karen', 'moira', 'google us english']
        : ['libby', 'sonia', 'serena', 'daniel', 'kate', 'hazel', 'nicky', 'rishi', 'google uk english female'];
      const premiumHints = ['enhanced', 'premium', 'natural', 'neural', 'siri', 'compact enhanced'];
      const unwantedHints = ['novelty', 'whisper', 'trinoids', 'zarvox', 'bad news', 'good news', 'hysterical', 'espeak', 'eloquence', 'festival', 'compact'];
      const scoreVoice = (voice) => {
        const lang = String(voice.lang || '').toLowerCase();
        const name = String(voice.name || '').toLowerCase();
        const uri = String(voice.voiceURI || '').toLowerCase();
        const signature = `${name} ${uri}`;
        let score = 0;
        if (lang === langPrefix) score += 90;
        else if (lang.startsWith(langPrefix)) score += 75;
        else if (lang.startsWith('en-')) score += 20;
        if (voice.localService) score += 18;
        if (voice.default) score += 8;
        if (preferredNames.some(h => signature.includes(h))) score += 24;
        if (signature.includes('female')) score += 4;
        if (signature.includes('male')) score -= 3;
        if (premiumHints.some(h => signature.includes(h))) score += 12;
        if (signature.includes('google')) score += 10;
        if (signature.includes('online') || signature.includes('cloud')) score -= 5;
        if (signature.includes('lite')) score -= 8;
        if (unwantedHints.some(h => signature.includes(h))) score -= 60;
        return score;
      };
      return [...voicePool].sort((a, b) => scoreVoice(b) - scoreVoice(a))[0] || null;
    }

    function stopSpeaking() {
      activeSpeechToken += 1;
      window.clearTimeout(speakTimer);
      try {
        if (window.speechSynthesis) {
          window.speechSynthesis.cancel();
        }
      } catch (err) {
        console.warn('speech cancel failed', err);
      }
    }

    function speak(text, options = {}) {
      if (!text) return;
      try {
        const mode = options.mode || 'normal';
        const token = activeSpeechToken + 1;
        stopSpeaking();
        activeSpeechToken = token;
        const voice = pickVoice();
        const spokenText = mode === 'slow' ? buildSlowSpeakText(text) : buildNaturalSpeakText(text);
        const utter = new SpeechSynthesisUtterance(spokenText);
        utter.lang = accent;
        utter.volume = 1;
        utter.rate = mode === 'slow' ? 0.56 : 0.72;
        utter.pitch = mode === 'slow' ? 0.9 : 0.96;
        if (voice) utter.voice = voice;
        speakTimer = window.setTimeout(() => {
          if (token !== activeSpeechToken) return;
          window.speechSynthesis.speak(utter);
        }, mode === 'slow' ? 110 : 70);
      } catch (err) {
        console.warn('speak failed', err);
      }
    }

    function navigate(step, dir) {
      if (!curList.length) return;
      const target = curIdx + step;
      if (target < 0 || target >= curList.length) return;

      setTimeout(() => {
        card.classList.remove('slide-left', 'slide-right');
        curIdx = target;
        render({ autoplay: true });
        updateProgress();
      }, 165);
    }

    function renderReplacementChips(containerId, words, coreItem) {
      const el = document.getElementById(containerId);
      if (!el) return;
      if (!words.length) {
        el.innerHTML = '<span class="chip-btn" aria-disabled="true">暂无</span>';
        return;
      }
      el.innerHTML = words.map(w => (
        `<button class="chip-btn" data-word="${sanitizeHTML(w)}" aria-label="查看 ${sanitizeHTML(w)} 详情">${sanitizeHTML(w)}</button>`
      )).join('');
      el.querySelectorAll('.chip-btn[data-word]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const word = btn.getAttribute('data-word') || '';
          openSheet(word, coreItem);
        });
      });
    }

    function shuffleArray(items) {
      const out = Array.isArray(items) ? [...items] : [];
      for (let i = out.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [out[i], out[j]] = [out[j], out[i]];
      }
      return out;
    }

    function areReviewSubfiltersAllSelected() {
      return reviewFilters.cat1
        && reviewFilters.cat2
        && reviewFilters.cat3
        && reviewFilters.core
        && reviewFilters.replacement;
    }

    function isReviewPrimaryFilter(name) {
      return name === 'cat1' || name === 'cat2' || name === 'cat3';
    }

    function getReviewSourceCoreItems() {
      return curList.filter(item => coreByWord.has(String(item.word || '').toLowerCase()));
    }

    function getSelectedReviewCoreItems() {
      const sourceCoreItems = getReviewSourceCoreItems();
      const hasCatFilter = reviewFilters.cat1 || reviewFilters.cat2 || reviewFilters.cat3;
      if (!hasCatFilter) return [];
      return sourceCoreItems.filter(coreItem => coreMatchesSelectedCats(coreItem));
    }

    function getEffectiveReviewCardKinds() {
      const kinds = [];
      if (reviewFilters.core) kinds.push('core');
      if (reviewFilters.replacement) kinds.push('replacement');
      return kinds;
    }

    function getRelatedWordsForCore(coreItem) {
      if (!coreItem) return [];
      const anchored = (replacementByCoreId.get(coreItem.id) || []).map(item => String(item.word || '').trim()).filter(Boolean);
      if (anchored.length) return anchored;
      return parseSynonyms(coreItem.synonym_raw);
    }

    function getReviewCardIpa(card) {
      if (!card) return '';
      return String(accent === 'en-US' ? (card.ipa_us || card.ipa_uk || '') : (card.ipa_uk || card.ipa_us || '')).trim();
    }

    function computeReviewScopeStats() {
      const sourceCoreItems = getReviewSourceCoreItems();
      const selectedPrimaryCoreItems = getSelectedReviewCoreItems();
      let coreCount = 0;
      let replacementCount = 0;
      let cat1Count = 0;
      let cat2Count = 0;
      let cat3Count = 0;
      for (const coreItem of sourceCoreItems) {
        const replacementCards = collectReplacementCardsForCore(coreItem);
        coreCount += 1;
        replacementCount += replacementCards.length;
        const totalForCat = 1 + replacementCards.length;
        const category = String(coreItem.category || '').toUpperCase();
        if (/^Day 1\b/.test(category)) cat1Count += totalForCat;
        if (/^Day 2\b/.test(category)) cat2Count += totalForCat;
        if (/^Day 3\b/.test(category)) cat3Count += totalForCat;
      }
      let selectedCoreCount = 0;
      let selectedReplacementCount = 0;
      for (const coreItem of selectedPrimaryCoreItems) {
        const replacementCards = collectReplacementCardsForCore(coreItem);
        selectedCoreCount += 1;
        selectedReplacementCount += replacementCards.length;
      }
      return {
        all: coreCount + replacementCount,
        cat1: cat1Count,
        cat2: cat2Count,
        cat3: cat3Count,
        core: selectedCoreCount,
        replacement: selectedReplacementCount,
      };
    }

    function renderReviewScopeStats() {
      const stats = computeReviewScopeStats();
      const bindings = {
        'review-count-all': stats.all,
        'review-count-cat1': stats.cat1,
        'review-count-cat2': stats.cat2,
        'review-count-cat3': stats.cat3,
        'review-count-core': stats.core,
        'review-count-replacement': stats.replacement,
      };
      for (const [id, count] of Object.entries(bindings)) {
        const el = document.getElementById(id);
        if (el) el.innerText = String(count);
      }
    }

    function renderReviewSelectionSummary() {
      const summaryEl = document.getElementById('review-selection-summary');
      if (!summaryEl) return;
      const selectedCats = [];
      if (reviewFilters.cat1) selectedCats.push('第一类');
      if (reviewFilters.cat2) selectedCats.push('第二类');
      if (reviewFilters.cat3) selectedCats.push('第三类');
      const effectiveKinds = getEffectiveReviewCardKinds();
      const selectedKinds = effectiveKinds.map(kind => kind === 'core' ? '听力词' : '扩展词');
      const catText = selectedCats.length ? selectedCats.join('、') : '全部分类';
      const kindText = selectedKinds.length ? selectedKinds.join('、') : '未选题型';
      summaryEl.innerText = `已选：${catText}｜${kindText}`;
    }

    function syncReviewFilterUI() {
      const bindings = {
        'review-filter-all': reviewFilters.allWords,
        'review-filter-cat1': reviewFilters.cat1,
        'review-filter-cat2': reviewFilters.cat2,
        'review-filter-cat3': reviewFilters.cat3,
        'review-filter-core': reviewFilters.core,
        'review-filter-replacement': reviewFilters.replacement,
      };
      for (const [id, checked] of Object.entries(bindings)) {
        const el = document.getElementById(id);
        if (el) el.checked = !!checked;
      }
      renderReviewScopeStats();
      renderReviewSelectionSummary();
    }

    function setReviewFilter(name, checked) {
      if (name === 'allWords') {
        reviewFilters.allWords = checked;
        reviewFilters.cat1 = checked;
        reviewFilters.cat2 = checked;
        reviewFilters.cat3 = checked;
        reviewFilters.core = checked;
        reviewFilters.replacement = checked;
      } else {
        reviewFilters[name] = checked;
        reviewFilters.allWords = areReviewSubfiltersAllSelected();
      }
      syncReviewFilterUI();
      resetReviewDeck();
    }

    function coreMatchesSelectedCats(coreItem) {
      const category = String(coreItem && coreItem.category || '').toUpperCase();
      const hasCatFilter = reviewFilters.cat1 || reviewFilters.cat2 || reviewFilters.cat3;
      if (!hasCatFilter) return true;
      const selected = [];
      if (reviewFilters.cat1 && /^Day 1\b/.test(category)) selected.push('cat1');
      if (reviewFilters.cat2 && /^Day 2\b/.test(category)) selected.push('cat2');
      if (reviewFilters.cat3 && /^Day 3\b/.test(category)) selected.push('cat3');
      return selected.length > 0;
    }

    function collectReplacementCardsForCore(coreItem) {
      if (!coreItem) return [];
      return getRelatedWordsForCore(coreItem).map((word) => {
        const replacementItem = replacementByWord.get(String(word || '').toLowerCase()) || {};
        const meaningCn = String(replacementItem.meaning_cn || '').trim();
        if (!meaningCn || meaningCn === '（中文释义待校验）') return null;
        return {
          kind: 'replacement',
          id: replacementItem.id || `inferred:${coreItem.id}:${word}`,
          word: replacementItem.word || word,
          category: coreItem.category || '',
          anchorCoreId: coreItem.id,
          anchorCoreWord: coreItem.word,
          meaning_cn: meaningCn,
          meaning_en: replacementItem.meaning_en || '',
          ipa_us: replacementItem.ipa_us || '',
          ipa_uk: replacementItem.ipa_uk || '',
        };
      }).filter(Boolean);
    }

    function normalizeReviewText(value) {
      return String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
    }

    function renderAnswerDiff(expected, actual) {
      const expectedText = String(expected || '');
      const actualText = String(actual || '');
      const len = expectedText.length;
      const chars = [];
      for (let i = 0; i < len; i += 1) {
        const expChar = expectedText[i] || '';
        const matched = !!expChar && i < actualText.length && expChar.toLowerCase() === actualText[i].toLowerCase();
        const cssClass = matched ? 'hit' : 'gap';
        const displayChar = matched ? expChar : '_';
        chars.push(`<span class="review-diff-char ${cssClass}">${sanitizeHTML(displayChar)}</span>`);
      }
      return `
        <div class="review-answer-diff">
          <div class="review-diff-line">${chars.join('')}</div>
        </div>
      `;
    }

    function checkReviewAnswer(card, answer) {
      const expected = normalizeReviewText(card && card.word);
      const actual = normalizeReviewText(answer);
      const correct = !!expected && expected === actual;
      return { correct, expected, actual, diffHtml: renderAnswerDiff(card && card.word, answer) };
    }

    function buildReviewDeck() {
      const deck = [];
      const seen = new Set();
      const effectiveCardKinds = getEffectiveReviewCardKinds();
      const canIncludeCore = effectiveCardKinds.includes('core');
      const canIncludeReplacement = effectiveCardKinds.includes('replacement');
      const sourceCoreItems = getSelectedReviewCoreItems();

      for (const coreItem of sourceCoreItems) {
        if (canIncludeCore) {
          const coreCard = {
            kind: 'core',
            id: coreItem.id,
            word: coreItem.word,
            category: coreItem.category || '',
            meaning_cn: coreItem.meaning_cn || '',
            meaning_en: coreItem.meaning_en || '',
            ipa_us: coreItem.ipa_us || '',
            ipa_uk: coreItem.ipa_uk || '',
          };
          const key = `core:${coreCard.id}`;
          if (!seen.has(key)) {
            seen.add(key);
            deck.push(coreCard);
          }
        }

        if (canIncludeReplacement) {
          for (const replacementCard of collectReplacementCardsForCore(coreItem)) {
            const key = `replacement:${replacementCard.id || replacementCard.word}:${replacementCard.anchorCoreId}`;
            if (seen.has(key)) continue;
            seen.add(key);
            deck.push(replacementCard);
          }
        }
      }

      return deck;
    }

    function resetReviewDeck() {
      syncReviewFilterUI();
      reviewDeck = shuffleArray(buildReviewDeck());
      reviewIndex = 0;
      reviewCardFlipped = false;
      reviewAnswer = '';
      reviewLastWrongAnswer = '';
      reviewAnswerFeedbackHtml = '';
      renderReviewCard(reviewDeck[reviewIndex], { autoplay: true });
    }

    function flipReviewCard() {
      if (reviewMode !== 'cn') return;
      reviewCardFlipped = !reviewCardFlipped;
      const flipHost = document.getElementById('review-card-flip');
      if (flipHost) {
        flipHost.classList.toggle('is-flipped', reviewCardFlipped);
      }
    }

    function navigateReview(step, dir) {
      if (!reviewDeck.length) return;
      const target = reviewIndex + step;
      if (target < 0 || target >= reviewDeck.length) return;
      const host = document.getElementById('review-card-container');
      if (!host) {
        reviewIndex = target;
        reviewCardFlipped = false;
        reviewAnswer = '';
        reviewLastWrongAnswer = '';
        reviewAnswerFeedbackHtml = '';
        renderReviewCard(reviewDeck[reviewIndex], { autoplay: true });
        return;
      }
      host.classList.add(dir === 'left' ? 'slide-left' : 'slide-right');
      window.setTimeout(() => {
        host.classList.remove('slide-left', 'slide-right');
        reviewIndex = target;
        reviewCardFlipped = false;
        reviewAnswer = '';
        reviewLastWrongAnswer = '';
        reviewAnswerFeedbackHtml = '';
        renderReviewCard(reviewDeck[reviewIndex], { autoplay: true });
      }, 165);
    }

    function speakReviewWord(card) {
      if (!card || !card.word) return;
      speak(card.word);
    }

    function submitReviewAnswer() {
      if (reviewMode !== 'en') return;
      const card = reviewDeck[reviewIndex];
      if (!card) return;
      const result = checkReviewAnswer(card, reviewAnswer);
      if (result.correct) {
        reviewCardFlipped = true;
        reviewAnswer = '';
        reviewLastWrongAnswer = '';
        reviewAnswerFeedbackHtml = '';
        const flipHost = document.getElementById('review-card-flip');
        if (flipHost) {
          flipHost.classList.toggle('is-flipped', true);
          return;
        }
        renderReviewCard(card, { autoplay: false });
        return;
      }
      reviewCardFlipped = false;
      reviewLastWrongAnswer = reviewAnswer;
      reviewAnswer = '';
      reviewAnswerFeedbackHtml = result.diffHtml;
      renderReviewCard(card, { autoplay: false });
    }

    function markReviewWordForgotten() {
      if (reviewMode !== 'en') return;
      const card = reviewDeck[reviewIndex];
      if (!card) return;
      reviewCardFlipped = true;
      reviewAnswer = '';
      reviewLastWrongAnswer = '';
      reviewAnswerFeedbackHtml = '';
      renderReviewCard(card, { autoplay: false });
    }

    function renderReviewCard(card, options = {}) {
      const host = document.getElementById('review-card-container');
      if (!host) return;
      if (reviewMode === 'cn') {

    async function loadRootbookIndex() {
      if (rootbookIndexCache) return rootbookIndexCache;
      if (rootbookIndexPromise) return rootbookIndexPromise;
      rootbookIndexPromise = fetch('./rootbook_index.json', { cache: 'no-store' })
        .then(res => res.ok ? res.json() : {})
        .catch(() => ({}))
        .then(data => {
          rootbookIndexCache = data || {};
          return rootbookIndexCache;
        });
      return rootbookIndexPromise;
    }

    async function loadSupplementalDetails() {
      if (supplementalDetailCache) return supplementalDetailCache;
      if (supplementalDetailPromise) return supplementalDetailPromise;
      const bundled = window.__IELTS_DATA__ && window.__IELTS_DATA__.supplemental_details;
      if (bundled && typeof bundled === 'object') {
        supplementalDetailCache = bundled;
        return supplementalDetailCache;
      }
      supplementalDetailPromise = fetch('./supplemental_replacement_details.json', { cache: 'no-store' })
        .then(res => res.ok ? res.json() : {})
        .catch(() => ({}))
        .then(data => {
          supplementalDetailCache = data || {};
          return supplementalDetailCache;
        });
      return supplementalDetailPromise;
    }

    function buildDetailFromRootbook(word, entry) {
      if (!entry || typeof entry !== 'object') return null;
      const meaningCn = String(entry.meaning_cn || '').trim();
      const rootMemory = String(entry.root_memory || '').trim();
      const ipa = String(entry.ipa || '').trim();
      const phrases = Array.isArray(entry.phrases) ? entry.phrases : [];
      const example = String(entry.ielts_example || '').trim();
      if (!meaningCn && !rootMemory && !ipa && !phrases.length && !example) return null;
      return {
        word,
        ipa_us: ipa,
        ipa_uk: ipa,
        meaning_cn: meaningCn || '（中文释义待校验）',
        meaning_en: '',
        root_memory: rootMemory || '（词根待校验，避免误导）',
        phrases,
        ielts_example: example,
        source: 'rootbook'
      };
    }

    async function getSupplementalDetail(word) {
      const key = String(word || '').trim().toLowerCase();
      if (!key) return null;
      const supplementalDetails = await loadSupplementalDetails();
      if (supplementalDetails[key]) {
        return { source: 'supplemental_detail', ...supplementalDetails[key] };
      }
      if (AUDITED_DETAIL_OVERRIDES[key]) {
        return { word, source: 'audited_override', ...AUDITED_DETAIL_OVERRIDES[key] };
      }
      const index = await loadRootbookIndex();
      const entry = index[key] || null;
      return buildDetailFromRootbook(word, entry);
    }

    function getReplacementDetail(word, coreItem) {
      const wl = String(word || '').toLowerCase();
      const coreHit = coreByWord.get(wl);
      if (coreHit) {
        return {
          word: coreHit.word,
          ipa_us: coreHit.ipa_us || '',
          ipa_uk: coreHit.ipa_uk || '',
          meaning_cn: coreHit.meaning_cn || '',
          meaning_en: coreHit.meaning_en || '',
          root_memory: coreHit.root_memory || '（词根待补充）',
          phrases: coreHit.phrases || [],
          ielts_example: coreHit.ielts_example || '',
          source: 'core'
        };
      }

      const repl = replacementByWord.get(wl);
      if (repl) {
        const mean = String(repl.meaning_cn || '').replace(/^与主词.*?关系[；;]?/g, '').trim() || '（释义待校验）';
        return {
          word: repl.word || word,
          ipa_us: repl.ipa_us || '',
          ipa_uk: repl.ipa_uk || '',
          meaning_cn: mean,
          meaning_en: repl.meaning_en || '（英文释义待校验）',
          root_memory: repl.root_memory || '（词根待校验，避免误导）',
          phrases: repl.phrases || [],
          ielts_example: repl.ielts_example || '',
          source: 'replacement'
        };
      }

      return {
        word,
        ipa_us: '',
        ipa_uk: '',
        meaning_cn: '（中文释义待校验）',
        meaning_en: '',
        root_memory: '（词根待校验，避免误导）',
        phrases: [],
        ielts_example: '',
        source: 'fallback'
      };
    }

    function renderEnglishMeaningBlock(item) {
      const english = String(item.meaning_en || '').trim();
      if (!english || isPendingText(english)) return '';
      return `
        <details class="detail-optional">
          <summary>展开英文释义（辅助参考）</summary>
          <div class="muted-block">${sanitizeHTML(english)}</div>
        </details>
      `;
    }

    async function openSheet(word, coreItem) {
      let item = getReplacementDetail(word, coreItem);
      if (item.source === 'fallback' || isPendingText(item.meaning_cn) || isPendingText(item.root_memory)) {
        const supplemental = await getSupplementalDetail(word);
        if (supplemental) item = supplemental;
      }
      activeSheetItem = item;
      sheetWordShowsSyllables = false;
      const accentIpa = accent === 'en-US' ? item.ipa_us : item.ipa_uk;
      document.getElementById('sheet-title').innerText = item.word;
      const phraseHtml = formatPhraseHTML(item.phrases || []);
      const exampleHtml = formatExampleHTML(item.ielts_example);
      const englishBlock = renderEnglishMeaningBlock(item);
      const rootBlock = shouldDisplayRootMemory(item.root_memory)
        ? `<div class="item sheet-card"><span class="label l3">词根记忆</span><div class="txt">${sanitizeHTML(item.root_memory)}</div></div>`
        : '';
      const meaningFitClass = getHeadlineFitClass(item.meaning_cn);
      document.getElementById('sheet-body').innerHTML = `
        <div class="sheet-meaning ${meaningFitClass}">${sanitizeHTML(item.meaning_cn || '（中文释义待校验）')}</div>
        <div class="sheet-wordline">
          <button id="sheet-word-btn" class="sheet-word" aria-label="切换音节显示并播放 ${sanitizeHTML(item.word)}">${sanitizeHTML(item.word)}</button>
          <div class="sheet-sub">${sanitizeHTML(accentIpa || item.ipa_us || item.ipa_uk || '')}</div>
        </div>
        ${rootBlock}
        <div class="item"><span class="label l4">高频词组</span><div class="txt">${phraseHtml}</div></div>
        <div class="item"><span class="label l5">雅思真题例句</span><div class="txt example">${exampleHtml}</div></div>
        ${englishBlock}
      `;
      setWordButtonText('sheet-word-btn', item.word, sheetWordShowsSyllables);
      const sheetWordBtn = document.getElementById('sheet-word-btn');
      if (sheetWordBtn) {
        sheetWordBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleSheetWordDisplay();
        });
      }
      document.getElementById('modal-mask').classList.add('show');
      document.getElementById('bottom-sheet').classList.add('show');
      speak(item.word);
    }

    function closeSheet() {
      activeSheetItem = null;
      sheetWordShowsSyllables = false;
      document.getElementById('modal-mask').classList.remove('show');
      document.getElementById('bottom-sheet').classList.remove('show');
      stopSpeaking();
    }

    function normalizeHearingRecord(item, index) {
      const day = Number(item && item.day) || 0;
      const order = Number(item && item.order);
      const section = String(item && item.section || '').trim();
      const word = String(item && item.word || '').trim();
      return {
        id: `day-${day}-${index}-${word.toLowerCase()}`,
        day,
        order: Number.isFinite(order) ? order : index,
        category: section ? `Day ${day} · ${section}` : `Day ${day}`,
        section,
        word,
        meaning_cn: String(item && item.meaning_cn || '').trim(),
        meaning_en: '',
        ipa_us: String(item && item.ipa_us || '').trim(),
        ipa_uk: String(item && item.ipa_uk || '').trim(),
        root_memory: String(item && item.root_memory || '').trim(),
        phrases: [],
        ielts_example: '',
        synonym_raw: '',
      };
    }

    async function loadDataSources() {
      if (window.__HEARING_DAY1_21_APP__ && Array.isArray(window.__HEARING_DAY1_21_APP__.words)) {
        return window.__HEARING_DAY1_21_APP__;
      }
      const res = await fetch('../hearing_day1_21/hearing_day1_21_words.json', { cache: 'no-store' });
      return { words: await res.json() };
    }

    function getSelectedDays() {
      return reviewAllDays ? [...availableDays] : [...reviewDayFilters].sort((a, b) => a - b);
    }

    function getSearchMatchedRecords() {
      if (!searchQuery) return [...hearingRecords];
      return hearingRecords.filter((it) => {
        const base = [it.word, it.meaning_cn, it.root_memory, it.ipa_us, it.ipa_uk].join(' ').toLowerCase();
        return base.includes(searchQuery);
      });
    }

    function applyFilters({ preserveIndex = false, autoplay = false } = {}) {
      const selectedDays = new Set(getSelectedDays());
      const baseList = getSearchMatchedRecords();
      curList = baseList
        .filter(it => selectedDays.has(Number(it.day)))
        .filter(matchesReviewStatus)
        .sort((a, b) => (a.order - b.order) || (a.day - b.day));
      if (!preserveIndex || curIdx >= curList.length) curIdx = 0;
      listPage = Math.floor(curIdx / perPage) || 0;
      rerenderAllViews({ autoplay });
    }

    function getStatusCounts(baseList) {
      const familiarCount = baseList.filter(item => isWordFamiliar(item.word)).length;
      return {
        familiar: familiarCount,
        unfamiliar: baseList.length - familiarCount,
      };
    }

    function buildStatusFilterMarkup(prefix, statusCounts) {
      return `
        <label class="review-filter-item" for="${prefix}-status-unfamiliar">
          <input type="checkbox" id="${prefix}-status-unfamiliar" ${reviewStatusFilters.unfamiliar ? 'checked' : ''} />
          <span class="review-filter-copy"><span>未熟</span><span class="review-filter-count">${statusCounts.unfamiliar}</span></span>
        </label>
        <label class="review-filter-item" for="${prefix}-status-familiar">
          <input type="checkbox" id="${prefix}-status-familiar" ${reviewStatusFilters.familiar ? 'checked' : ''} />
          <span class="review-filter-copy"><span>已熟</span><span class="review-filter-count">${statusCounts.familiar}</span></span>
        </label>
      `;
    }

    function renderReviewFilterControls() {
      const host = document.getElementById('review-filter-grid');
      if (!host) return;

      const scopedList = baseList.filter(matchesReviewStatus);
      const dayCounts = new Map();
      for (const day of availableDays) {
        dayCounts.set(day, scopedList.filter(item => Number(item.day) === day).length);
      }
      const allCount = scopedList.length;
      const statusCounts = getStatusCounts(baseList);
      host.innerHTML = `
        <div class="review-filter-section">
          <div class="review-filter-section-label">熟悉状态</div>
          <div class="review-status-grid list-status-grid">
            ${buildStatusFilterMarkup('review', statusCounts)}
          </div>
        </div>
        <div class="review-filter-section">
          <div class="review-filter-section-label">Day 范围</div>
          <div class="review-filter-grid">
            <label class="review-filter-item review-filter-all" for="review-filter-all">
              <input type="checkbox" id="review-filter-all" ${reviewAllDays ? 'checked' : ''} />
              <span class="review-filter-copy"><span>全部 Day</span><span class="review-filter-count">${allCount}</span></span>
            </label>
            ${availableDays.map((day) => `
              <label class="review-filter-item" for="review-filter-day-${day}">
                <input type="checkbox" id="review-filter-day-${day}" data-day="${day}" ${reviewAllDays || reviewDayFilters.has(day) ? 'checked' : ''} />

    function renderListFilterControls() {
      const host = document.getElementById('list-filter-grid');
      const statusHost = document.getElementById('list-status-grid');
      if (!host || !statusHost) return;
      const baseList = getSearchMatchedRecords();
      const scopedList = baseList.filter(matchesReviewStatus);
      const dayCounts = new Map();
      for (const day of availableDays) {
        dayCounts.set(day, scopedList.filter(item => Number(item.day) === day).length);
      }
      const allCount = scopedList.length;
      const statusCounts = getStatusCounts(baseList);
      statusHost.innerHTML = buildStatusFilterMarkup('list', statusCounts);

        <label class="review-filter-item review-filter-all" for="list-filter-all">

    function renderListSelectionSummary() {
      const summaryEl = document.getElementById('list-selection-summary');
      if (!summaryEl) return;
      const selectedStatus = [];
      if (reviewStatusFilters.unfamiliar) selectedStatus.push('未熟');
      if (reviewStatusFilters.familiar) selectedStatus.push('已熟');
      if (reviewAllDays) {
        summaryEl.innerText = `已选：全部 Day｜${selectedStatus.length ? selectedStatus.join('、') : '无状态'}`;
        return;
      }
      const selected = getSelectedDays();
      const dayText = selected.length ? selected.map(day => `Day ${day}`).join('、') : '无 Day';
      const statusText = selectedStatus.length ? selectedStatus.join('、') : '无状态';
      summaryEl.innerText = `已选：${dayText}｜${statusText}`;
    }

    function renderReviewSelectionSummary() {
      const summaryEl = document.getElementById('review-selection-summary');
      if (!summaryEl) return;
      const selectedStatus = [];
      if (reviewStatusFilters.unfamiliar) selectedStatus.push('未熟');
      if (reviewStatusFilters.familiar) selectedStatus.push('已熟');
      if (reviewAllDays) {
        summaryEl.innerText = `已选：全部 Day｜${selectedStatus.length ? selectedStatus.join('、') : '无状态'}`;
        return;
      }
      const selected = getSelectedDays();
      const dayText = selected.length ? selected.map(day => `Day ${day}`).join('、') : '无 Day';
      const statusText = selectedStatus.length ? selectedStatus.join('、') : '无状态';
      summaryEl.innerText = `已选：${dayText}｜${statusText}`;
    }

    function syncReviewFilterUI() {
      renderReviewFilterControls();
      renderListFilterControls();
    }

    function setReviewFilter(name, checked) {
      if (name === 'allDays') {
        reviewAllDays = checked;
        reviewDayFilters = checked ? new Set(availableDays) : new Set();
      }
      syncReviewFilterUI();
      applyFilters();
    }

    function toggleReviewDayFilter(day, checked) {
      reviewAllDays = false;
      if (checked) reviewDayFilters.add(day);
      else reviewDayFilters.delete(day);
      if (reviewDayFilters.size === availableDays.length && availableDays.length) {
        reviewAllDays = true;
      }
      syncReviewFilterUI();
      applyFilters();
    }

    function matchesReviewStatus(item) {
      const familiar = isWordFamiliar(item && item.word);
      if (reviewStatusFilters.unfamiliar && reviewStatusFilters.familiar) return true;
      if (reviewStatusFilters.unfamiliar) return !familiar;
      if (reviewStatusFilters.familiar) return familiar;
      return false;
    }

    function buildReviewDeck() {
      return shuffleArray(curList.filter(matchesReviewStatus).map((item) => ({
        kind: 'word',
        id: item.id,
        word: item.word,
        day: item.day,
        category: item.category,
        meaning_cn: item.meaning_cn,
        meaning_en: '',
        ipa_us: item.ipa_us || '',
        ipa_uk: item.ipa_uk || '',
        root_memory: item.root_memory || '',
      })));
    }

    function bindEvents() {
      document.getElementById('f-word').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleWordDisplayMode();
      });

      document.getElementById('f-ipa').addEventListener('click', (e) => {
        e.stopPropagation();
        accent = accent === 'en-US' ? 'en-GB' : 'en-US';
        render({ autoplay: true });
      });

      document.getElementById('card-familiar-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        const it = curList[curIdx];
        if (!it) return;
        setWordFamiliarState(it.word, !isWordFamiliar(it.word), { rerenderCard: false });
      });

      document.getElementById('main-card').addEventListener('click', (e) => {
        if (
          e.target.closest('#f-word')
          || e.target.closest('#f-ipa')
          || e.target.closest('#card-familiar-btn')
        ) return;
        toggleCardFlip();
      });

      document.getElementById('prev-btn').addEventListener('click', () => navigate(-1, 'right'));
      document.getElementById('next-btn').addEventListener('click', () => navigate(1, 'left'));

      const exportBtn = document.getElementById('progress-export-btn');
      if (exportBtn) {
        exportBtn.addEventListener('click', () => {
          downloadProgressFile(exportProgressState());
        });
      }

      const importBtn = document.getElementById('progress-import-btn');
      const importInput = document.getElementById('progress-import-input');
      if (importBtn && importInput) {
        importBtn.addEventListener('click', () => importInput.click());
        importInput.addEventListener('change', async (e) => {
          const target = e.target;
          const file = target.files && target.files[0];
          if (!file) return;
          try {
            await importProgressState(file);
          } catch (err) {
            console.warn('failed to import progress', err);
            window.alert(err instanceof Error ? err.message : '导入失败：请确认文件来自 hearing_day1_21 的进度导出。');
          } finally {
            target.value = '';
          }
        });
      }

      document.addEventListener('keydown', (e) => {
        if (e.target && /input|textarea|select/i.test(e.target.tagName || '')) return;
        if (viewMode === 'card' && e.key === 'ArrowRight') {
          e.preventDefault();
          navigate(1, 'left');
        }
        if (viewMode === 'card' && e.key === 'ArrowLeft') {
          e.preventDefault();
          navigate(-1, 'right');
        }
        if (viewMode === 'card' && (e.code === 'Space' || e.key === ' ')) {
          e.preventDefault();
          navigate(1, 'left');
        }
        if (viewMode === 'review' && e.key === 'ArrowRight') {
          e.preventDefault();
          navigateReview(1, 'left');
        }
        if (viewMode === 'review' && e.key === 'ArrowLeft') {
          e.preventDefault();
          navigateReview(-1, 'right');
        }
        if (viewMode === 'review' && (e.code === 'Space' || e.key === ' ')) {
          e.preventDefault();
          navigateReview(1, 'left');
        }
      }, { passive: false });

      document.addEventListener('wheel', (e) => {
        if (viewMode !== 'card' && viewMode !== 'review') return;
        if (Math.abs(e.deltaY) < 16) return;
        if (wheelLock) return;
        wheelLock = true;
        setTimeout(() => { wheelLock = false; }, 170);
        e.preventDefault();
        if (viewMode === 'card') {
          if (e.deltaY > 0) navigate(1, 'left');
          else navigate(-1, 'right');
          return;
        }
        if (e.deltaY > 0) navigateReview(1, 'left');
        else navigateReview(-1, 'right');
      }, { passive: false });

      document.addEventListener('touchstart', (e) => {
        if (viewMode !== 'card' && viewMode !== 'review') return;
        if (viewMode === 'review' && e.target.closest('#review-answer-input')) return;
        touchStartX = e.changedTouches[0].clientX;
      }, { passive: true });

      document.addEventListener('touchend', (e) => {
        if (viewMode !== 'card' && viewMode !== 'review') return;
        const endX = e.changedTouches[0].clientX;
        const delta = touchStartX - endX;
        if (viewMode === 'card') {
          if (delta > 46) navigate(1, 'left');
          if (delta < -46) navigate(-1, 'right');
          return;
        }
        if (delta > 46) navigateReview(1, 'left');
        if (delta < -46) navigateReview(-1, 'right');
      }, { passive: true });

      const reviewGrid = document.getElementById('review-filter-grid');
      if (reviewGrid) {
        reviewGrid.addEventListener('change', (e) => {
          const target = e.target;
          if (!(target instanceof HTMLInputElement)) return;
          if (target.id === 'review-filter-all') {
            setReviewFilter('allDays', target.checked);
            return;
          }
          if (target.id === 'review-status-unfamiliar') {
            reviewStatusFilters.unfamiliar = target.checked;
            renderReviewSelectionSummary();
            applyFilters();
            return;
          }
          if (target.id === 'review-status-familiar') {
            reviewStatusFilters.familiar = target.checked;
            renderReviewSelectionSummary();
            applyFilters();
            return;
          }
          const day = Number(target.dataset.day || 0);
          if (day) toggleReviewDayFilter(day, target.checked);
        });
      }

      const listGrid = document.getElementById('list-filter-grid');
      if (listGrid) {
        listGrid.addEventListener('change', (e) => {
          const target = e.target;
          if (!(target instanceof HTMLInputElement)) return;
          if (target.id === 'list-filter-all') {
            setReviewFilter('allDays', target.checked);
            return;
          }
          const day = Number(target.dataset.day || 0);
          if (day) toggleReviewDayFilter(day, target.checked);
        });
      }

      const listStatusGrid = document.getElementById('list-status-grid');
      if (listStatusGrid) {
        listStatusGrid.addEventListener('change', (e) => {
          const target = e.target;
          if (!(target instanceof HTMLInputElement)) return;
          if (target.id === 'list-status-unfamiliar') {
            reviewStatusFilters.unfamiliar = target.checked;
            renderListSelectionSummary();
            applyFilters();
            return;
          }
          if (target.id === 'list-status-familiar') {
            reviewStatusFilters.familiar = target.checked;
            renderListSelectionSummary();
            applyFilters();
          }
        });
      }
    }

    function switchView(mode) {
      closeSheet();
      viewMode = mode;
      const navVisible = mode === 'card';
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');
      document.getElementById('card-view').style.display = mode === 'card' ? 'flex' : 'none';
      document.getElementById('list-view').style.display = mode === 'list' ? 'flex' : 'none';
      document.getElementById('review-view').style.display = mode === 'review' ? 'flex' : 'none';
      const footer = document.getElementById('main-footer');
      footer.classList.toggle('footer-card', navVisible);
      footer.classList.toggle('footer-static', !navVisible);
      prevBtn.style.display = navVisible ? 'inline-flex' : 'none';
      nextBtn.style.display = navVisible ? 'inline-flex' : 'none';
      prevBtn.style.pointerEvents = navVisible ? 'auto' : 'none';
      nextBtn.style.pointerEvents = navVisible ? 'auto' : 'none';
      document.getElementById('tab-card').classList.toggle('active', mode === 'card');
      document.getElementById('tab-list').classList.toggle('active', mode === 'list');
      document.getElementById('tab-review').classList.toggle('active', mode === 'review');
      if (mode === 'list') {
        listPage = Math.floor(curIdx / perPage) || 0;
        renderList();
      } else if (mode === 'review') {
        resetReviewDeck();
      } else {
        render({ autoplay: false });
      }
    }

    function jumpTo(idx) {
      curIdx = idx;
      switchView('card');
      render({ autoplay: true });
      updateProgress();
    }

    function speakListWord(idx) {
      const item = curList[idx];
      if (!item) return;
      speak(item.word);
    }

    function changePage(step) {
      const max = Math.ceil(curList.length / perPage);
      const next = listPage + step;
      if (next < 0 || next >= max) return;
      listPage = next;
      renderList();
    }

    function onSearch() {
      searchQuery = document.getElementById('search').value.trim().toLowerCase();
      applyFilters({ autoplay: false });
    }

    function updateProgress() {
      const total = curList.length;
      const shown = total ? curIdx + 1 : 0;
      document.getElementById('progress').innerText = `${shown} / ${total}`;
      document.getElementById('progress-sub').innerText = `Day 1-21 听力词表 · 共 ${hearingRecords.length} 词`;
    }

    function refreshSharedViews() {
      syncCardFamiliarUI();
      renderReviewFilterControls();
      renderListFilterControls();
      updateProgress();
    }

    function rerenderAllViews(options = {}) {
      const { autoplay = false } = options;
      refreshSharedViews();
      if (viewMode === 'card') {
        render({ autoplay });
        return;
      }
      if (viewMode === 'list') {
        renderList();
        return;
      }
      resetReviewDeck();
    }

      return {
        app: 'hearing_day1_21',
        version: 1,
        exported_at: new Date().toISOString(),
        familiar_words: Array.from(familiarWords).map(normalizeWordKey).filter(Boolean).sort(),
      };
    }

    function downloadProgressFile(payload) {
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const stamp = new Date().toISOString().slice(0, 10);
      a.download = `hearing_day1_21_progress_${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function parseProgressFile(rawText) {
      let payload;
      try {
        payload = JSON.parse(rawText);
      } catch (error) {
        throw new Error('导入失败：文件不是合法 JSON。');
      }
      if (!payload || payload.app !== 'hearing_day1_21') {
        throw new Error('导入失败：不是 Day1-21 项目的进度文件。');
      }
      if (payload.version !== 1) {
        throw new Error('导入失败：进度文件版本不受支持。');
      }
      if (!Array.isArray(payload.familiar_words)) {
        throw new Error('导入失败：熟悉词列表格式不正确。');
      }
      return payload.familiar_words.map(normalizeWordKey).filter(Boolean);
    }

    function applyImportedProgress(words) {
      // replace familiar state with imported words
      familiarWords = new Set(words);
      localStorage.removeItem(FAMILIAR_WORDS_KEY);
      localStorage.setItem(FAMILIAR_WORDS_KEY, JSON.stringify(Array.from(familiarWords)));
      rerenderAllViews();
    }

    async function importProgressState(file) {
      const importedWords = parseProgressFile(await file.text());
      applyImportedProgress(importedWords);
    }

    async function init() {
      try {
        const payload = await loadDataSources();
        const sourceWords = Array.isArray(payload.words) ? payload.words : [];
        hearingRecords = sourceWords
          .map((item, index) => normalizeHearingRecord(item, index))
          .sort((a, b) => (a.order - b.order) || (a.day - b.day));
        availableDays = [...new Set(hearingRecords.map(item => Number(item.day)).filter(Boolean))].sort((a, b) => a - b);
        familiarWords = loadFamiliarWords();
        reviewAllDays = true;
        reviewDayFilters = new Set(availableDays);
        coreData = [...hearingRecords];
        replacementData = [];
        buildReplacementMapByWord();
        curList = [...coreData];

        bindEvents();
        initVoices();
        refreshSharedViews();
        render({ autoplay: true });
        resetReviewDeck();
      } catch (err) {
        document.getElementById('f-word').innerText = '数据加载失败';
        document.getElementById('progress-sub').innerText = '请确认 hearing_day1_21_app_bundle.js 或 hearing_day1_21_words.json 存在';
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
