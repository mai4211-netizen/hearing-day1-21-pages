            </button>
            <div class="hearing-list-actions">
              <button class="hearing-list-familiar ${isWordUnfamiliar(it.word) ? 'active' : ''}" type="button" onclick="toggleListWordUnfamiliar(${start + i})" aria-pressed="${isWordUnfamiliar(it.word) ? 'true' : 'false'}" aria-label="${isWordUnfamiliar(it.word) ? '将' : '标记'} ${sanitizeHTML(it.word)} ${isWordUnfamiliar(it.word) ? '设为已熟' : '设为未熟'}">未熟</button>
              <button class="hearing-list-arrow" type="button" onclick="jumpTo(${start + i})" aria-label="前往 ${sanitizeHTML(it.word)} 卡片">→</button>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('page-num').innerText = `${listPage + 1} / ${Math.max(1, Math.ceil(curList.length / perPage))}`;
      if (preserveScroll) {
        const maxScrollTop = Math.max(0, host.scrollHeight - host.clientHeight);
        host.scrollTop = Math.min(previousScrollTop, maxScrollTop);
        return;
      }
      host.scrollTop = 0;
    }

    function switchView(mode) {
      closeSheet();
      viewMode = mode;
      const navVisible = mode === 'card';
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');
      document.getElementById('card-view').style.display = mode === 'card' ? 'flex' : 'none';
      document.getElementById('list-view').style.display = mode === 'list' ? 'flex' : 'none';
      document.getElementById('review-view').style.display = mode === 'review' ? 'flex' : 'none';
      const footer = document.getElementById('main-footer');
      footer.classList.toggle('footer-card', navVisible);
      footer.classList.toggle('footer-static', !navVisible);
      prevBtn.style.visibility = navVisible ? 'visible' : 'hidden';
      nextBtn.style.visibility = navVisible ? 'visible' : 'hidden';
      prevBtn.style.pointerEvents = navVisible ? 'auto' : 'none';
      nextBtn.style.pointerEvents = navVisible ? 'auto' : 'none';
      document.getElementById('tab-card').classList.toggle('active', mode === 'card');
      document.getElementById('tab-list').classList.toggle('active', mode === 'list');
      document.getElementById('tab-review').classList.toggle('active', mode === 'review');
      if (mode === 'list') {
        listPage = Math.floor(curIdx / perPage) || 0;
        renderList();
      } else if (mode === 'review') {
        resetReviewDeck();
      } else {
        render({ autoplay: false });
      }
    }

    function jumpTo(idx) {
      curIdx = idx;
      switchView('card');
      render({ autoplay: true });
      updateProgress();
    }

    function speakListWord(idx) {
      const item = curList[idx];
      if (!item) return;
      playAudioOrSpeak(item.word);
    }

    function toggleListWordUnfamiliar(idx) {
      const item = curList[idx];
      if (!item) return;
      setWordUnfamiliarState(item.word, !isWordUnfamiliar(item.word), { rerenderCard: false, advanceReview: false });
    }

    function changePage(step) {
      const max = Math.ceil(curList.length / perPage);
      const next = listPage + step;
      if (next < 0 || next >= max) return;
      listPage = next;
      renderList();
    }

    function onSearch() {
      searchQuery = document.getElementById('search').value.trim().toLowerCase();
      applyFilters({ autoplay: false });
    }

    function updateProgress() {
      const total = curList.length;
      const shown = total ? curIdx + 1 : 0;
      document.getElementById('progress').innerText = `${shown} / ${total}`;
      document.getElementById('progress-sub').innerText = `Day 1-21 听力词表 · 共 ${hearingRecords.length} 词`;
    }

    function refreshSharedViews() {
      syncCardFamiliarUI();
      renderReviewFilterControls();
      renderListFilterControls();
      updateProgress();
    }

    function rerenderAllViews(options = {}) {
      const { autoplay = false, preserveListScroll = false } = options;
      refreshSharedViews();
      if (viewMode === 'card') {
        render({ autoplay });
        return;
      }
      if (viewMode === 'list') {
        renderList({ preserveScroll: preserveListScroll });
        return;
      }
      resetReviewDeck();
    }

    function exportProgressState() {
      return {
        app: 'hearing_day1_21',
        version: 2,
        exported_at: new Date().toISOString(),
        unfamiliar_words: Array.from(unfamiliarWords).map(normalizeWordKey).filter(Boolean).sort(),
      };
    }

    function downloadProgressFile(payload) {
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const stamp = new Date().toISOString().slice(0, 10);
      a.download = `hearing_day1_21_progress_${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function parseProgressFile(rawText) {
      let payload;
      try {
        payload = JSON.parse(rawText);
      } catch (error) {
        throw new Error('导入失败：文件不是合法 JSON。');
      }
      if (!payload || payload.app !== 'hearing_day1_21') {
        throw new Error('导入失败：不是 Day1-21 项目的进度文件。');
      }
      if (payload.version === 2) {
        if (!Array.isArray(payload.unfamiliar_words)) {
          throw new Error('导入失败：生词列表格式不正确。');
        }
        return payload.unfamiliar_words.map(normalizeWordKey).filter(Boolean);
      }
      if (payload.version === 1) {
        if (!Array.isArray(payload.familiar_words)) {
          throw new Error('导入失败：熟悉词列表格式不正确。');
        }
        const familiarSet = new Set(payload.familiar_words.map(normalizeWordKey).filter(Boolean));
        const allWords = Array.from(new Set(hearingRecords.map(item => normalizeWordKey(item.word)).filter(Boolean)));
        return allWords.filter(word => !familiarSet.has(word));
      }
      if (payload.version !== 2) {
        throw new Error('导入失败：进度文件版本不受支持。');
      }
      return [];
    }

    function applyImportedProgress(words) {
      // replace unfamiliar state with imported words
      unfamiliarWords = new Set(words);
      localStorage.removeItem(UNFAMILIAR_WORDS_KEY);
      localStorage.setItem(UNFAMILIAR_WORDS_KEY, JSON.stringify(Array.from(unfamiliarWords)));
      rerenderAllViews();
    }

    async function importProgressState(file) {
      const importedWords = parseProgressFile(await file.text());
      applyImportedProgress(importedWords);
    }

    async function init() {
      try {
        const payload = await loadDataSources();
        const sourceWords = Array.isArray(payload.words) ? payload.words : [];
        audioBasePath = String(payload.audio_base_path || AUDIO_BASE_PATH);
        audioManifest = payload.audio_manifest && typeof payload.audio_manifest === 'object' ? payload.audio_manifest : {};
        hearingRecords = sourceWords
          .map((item, index) => normalizeHearingRecord(item, index))
          .sort((a, b) => (a.order - b.order) || (a.day - b.day));
        availableDays = [...new Set(hearingRecords.map(item => Number(item.day)).filter(Boolean))].sort((a, b) => a - b);
        unfamiliarWords = loadUnfamiliarWords();
        chineseVisible = loadChineseVisibility();
        reviewAllDays = true;
        reviewDayFilters = new Set(availableDays);
        coreData = [...hearingRecords];
        replacementData = [];
        buildReplacementMapByWord();
        curList = [...coreData];

        bindEvents();
        initVoices();
        syncSpeechUnlockOverlay();
        syncChineseVisibilityUI();
        refreshSharedViews();
        render({ autoplay: true });
        resetReviewDeck();
      } catch (err) {
        document.getElementById('f-word').innerText = '数据加载失败';
        document.getElementById('progress-sub').innerText = '请确认 hearing_day1_21_app_bundle.js 或 hearing_day1_21_words.json 存在';
        console.error(err);
      }
    }

    init();
  </script>
